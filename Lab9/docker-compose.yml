version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ivolve

    volumes:
      - db_data:/var/lib/mysql

    ports:
      - "3306:3306"

  app:
    build: .
    container_name: node-app

    depends_on:
      - db

    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root123

    ports:
      - "3000:3000"

volumes:
  db_data:
